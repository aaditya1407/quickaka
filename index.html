<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ─── Default SEO (overridden per-page by react-helmet-async) ─── -->
    <title>QuicKaka — Bhopal's Trusted Home Services Platform</title>
    <meta
      name="description"
      content="QuicKaka offers 37+ verified home services in Bhopal — plumbing, electrician, cleaning, painting, legal, events & more. Book a trusted professional in minutes."
    />
    <meta
      name="keywords"
      content="QuicKaka, home services Bhopal, plumber Bhopal, electrician Bhopal, cleaning services, home repair, AC repair Bhopal, painting services, pest control Bhopal, home maintenance"
    />
    <meta name="author" content="GS Enterprises" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://www.quickaka.com/" />

    <!-- ─── Open Graph — for WhatsApp, Facebook, LinkedIn shares ─── -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="QuicKaka" />
    <meta
      property="og:title"
      content="QuicKaka — Bhopal's Trusted Home Services Platform"
    />
    <meta
      property="og:description"
      content="37+ verified home services under one roof. Book a trusted Kaka for your Bhopal home in minutes."
    />
    <meta property="og:url" content="https://www.quickaka.com/" />
    <meta
      property="og:image"
      content="https://www.quickaka.com/og-image.jpg"
    />

    <!-- ─── Twitter Card ─── -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="QuicKaka — Bhopal's Trusted Home Services Platform"
    />
    <meta
      name="twitter:description"
      content="37+ verified home services under one roof. Book a trusted Kaka for your Bhopal home in minutes."
    />
    <meta
      name="twitter:image"
      content="https://www.quickaka.com/og-image.jpg"
    />

    <!-- ─── JSON-LD Structured Data — tells Google you're a local business ─── -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "LocalBusiness",
        "name": "QuicKaka",
        "description": "Bhopal's trusted platform for 37+ verified home services — plumbing, electrical, cleaning, painting, legal, events & more.",
        "url": "https://www.quickaka.com",
        "telephone": "+91-XXXXXXXXXX",
        "address": {
          "@type": "PostalAddress",
          "streetAddress": "32 Vaishali Nagar, Kotra Sultanabad",
          "addressLocality": "Bhopal",
          "addressRegion": "Madhya Pradesh",
          "postalCode": "462003",
          "addressCountry": "IN"
        },
        "geo": {
          "@type": "GeoCoordinates",
          "latitude": "23.2599",
          "longitude": "77.4126"
        },
        "areaServed": {
          "@type": "City",
          "name": "Bhopal"
        },
        "sameAs": [],
        "openingHours": "Mo-Su 08:00-21:00",
        "priceRange": "₹₹"
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
