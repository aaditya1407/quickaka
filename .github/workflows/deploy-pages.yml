name: Build & Deploy to Public Pages Repo

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout private repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Show versions (debug)
        run: |
          node -v
          npm -v
          node -p "process.platform + ' ' + process.arch"

      # Fresh install on Linux to regenerate a correct lockfile
      - name: Fresh install on Linux (regenerate lock)
        run: |
          rm -rf node_modules package-lock.json
          npm install --no-audit --no-fund

      - name: Build
        env:
          VITE_GOOGLE_FORM_URL: ${{ secrets.VITE_GOOGLE_FORM_URL }}
          VITE_GOOGLE_FORM_ENTRY_NAME: ${{ secrets.VITE_GOOGLE_FORM_ENTRY_NAME }}
          VITE_GOOGLE_FORM_ENTRY_PHONE: ${{ secrets.VITE_GOOGLE_FORM_ENTRY_PHONE }}
          VITE_GOOGLE_FORM_ENTRY_EMAIL: ${{ secrets.VITE_GOOGLE_FORM_ENTRY_EMAIL }}
          VITE_GOOGLE_FORM_ENTRY_SERVICE: ${{ secrets.VITE_GOOGLE_FORM_ENTRY_SERVICE }}
          VITE_GOOGLE_FORM_ENTRY_MESSAGE: ${{ secrets.VITE_GOOGLE_FORM_ENTRY_MESSAGE }}
          VITE_PARTNER_GOOGLE_FORM_URL: ${{ secrets.VITE_PARTNER_GOOGLE_FORM_URL }}
          VITE_PARTNER_GOOGLE_FORM_ENTRY_NAME: ${{ secrets.VITE_PARTNER_GOOGLE_FORM_ENTRY_NAME }}
          VITE_PARTNER_GOOGLE_FORM_ENTRY_PHONE: ${{ secrets.VITE_PARTNER_GOOGLE_FORM_ENTRY_PHONE }}
          VITE_PARTNER_GOOGLE_FORM_ENTRY_MESSAGE: ${{ secrets.VITE_PARTNER_GOOGLE_FORM_ENTRY_MESSAGE }}
        run: |
          npm run build
          echo "OUT_DIR=dist" >> $GITHUB_ENV

      - name: Deploy to public repo
        uses: peaceiris/actions-gh-pages@v3
        with:
          publish_dir: ${{ env.OUT_DIR }}
          publish_branch: gh-pages
          external_repository: BBBSolutions/quickaka-main
          personal_token: ${{ secrets.PUBLIC_REPO_TOKEN }}
          user_name: github-actions[bot]
          user_email: 41898282+github-actions[bot]@users.noreply.github.com
          cname: quickaka.the3bsolutions.com
